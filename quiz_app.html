<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizMind AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --bot-bubble: #1e1e30;
    --user-bubble: #2d1f5e;
    --correct: #1a3a2a;
    --correct-border: #4ade80;
    --wrong: #3a1a1a;
    --wrong-border: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === HEADER === */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* === MAIN LAYOUT === */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* === CHAT PANEL === */
  .chat-panel {
    width: 380px;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .panel-title {
    padding: 14px 20px;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn 0.3s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-items: flex-start; }
  .message.user { align-items: flex-end; }

  .msg-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    padding: 0 4px;
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.6;
    max-width: 92%;
  }

  .message.bot .msg-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .message.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid #3d2a7a;
    border-bottom-right-radius: 4px;
    color: #d0c8ff;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .chat-input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:hover { background: #6a58e8; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* === QUIZ PANEL === */
  .quiz-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  /* IDLE STATE */
  .quiz-idle {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    text-align: center;
  }

  .idle-icon {
    width: 80px; height: 80px;
    border-radius: 20px;
    background: var(--surface2);
    border: 2px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .idle-title {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .idle-sub {
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 300px;
    line-height: 1.7;
    font-weight: 400;
  }

  .interest-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 400px;
  }

  .tag {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid;
    animation: tagIn 0.3s ease both;
  }

  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .tag-tech { background: #1a1a3a; border-color: var(--accent); color: var(--accent); }
  .tag-science { background: #1a2a2a; border-color: var(--accent3); color: var(--accent3); }
  .tag-history { background: #2a1a1a; border-color: #ffb86a; color: #ffb86a; }
  .tag-sports { background: #1a2a1a; border-color: #4ade80; color: #4ade80; }
  .tag-movies { background: #2a1a2a; border-color: var(--accent2); color: var(--accent2); }
  .tag-music { background: #2a1a10; border-color: #ff9f6a; color: #ff9f6a; }
  .tag-default { background: var(--surface2); border-color: var(--border); color: var(--muted); }

  /* LOADING STATE */
  .quiz-loading {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .loader-ring {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* QUIZ ACTIVE STATE */
  .quiz-active {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .quiz-header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .quiz-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .quiz-topic {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .quiz-progress-label {
    font-weight: 700;
    font-size: 1rem;
  }

  .score-display {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  .score-num {
    color: var(--accent3);
    font-weight: 700;
  }

  .quiz-progress-bar {
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
  }

  .quiz-body {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .quiz-body::-webkit-scrollbar { width: 4px; }
  .quiz-body::-webkit-scrollbar-track { background: transparent; }
  .quiz-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .question-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .option-btn {
    padding: 16px 20px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: attr(data-letter);
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.2s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .option-btn:hover:not(:disabled)::before {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .option-btn.correct {
    background: var(--correct);
    border-color: var(--correct-border);
    color: #4ade80;
  }

  .option-btn.correct::before {
    background: var(--correct-border);
    border-color: var(--correct-border);
    color: white;
  }

  .option-btn.wrong {
    background: var(--wrong);
    border-color: var(--wrong-border);
    color: #f87171;
  }

  .option-btn.wrong::before {
    background: var(--wrong-border);
    border-color: var(--wrong-border);
    color: white;
  }

  .option-btn:disabled { cursor: not-allowed; }

  .feedback-bar {
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback-bar.correct-fb {
    background: var(--correct);
    border: 1px solid var(--correct-border);
    color: #4ade80;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .feedback-bar.wrong-fb {
    background: var(--wrong);
    border: 1px solid var(--wrong-border);
    color: #f87171;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .next-btn {
    align-self: flex-end;
    padding: 12px 28px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .next-btn:hover { background: #6a58e8; }
  .next-btn:active { transform: scale(0.96); }

  /* RESULTS */
  .quiz-results {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px;
    text-align: center;
  }

  .result-score-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, var(--accent2) var(--pct), var(--surface2) var(--pct));
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .result-score-inner {
    width: 96px; height: 96px;
    background: var(--bg);
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .result-score-num {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
  }

  .result-score-total {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .result-title {
    font-size: 1.5rem;
    font-weight: 800;
  }

  .result-subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.7;
  }

  .result-actions {
    display: flex;
    gap: 12px;
  }

  .btn-primary {
    padding: 12px 24px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-primary:hover { background: #6a58e8; }

  .btn-ghost {
    padding: 12px 24px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* HIDDEN */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Quiz<span>Mind</span> AI
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="status-label">AI ONLINE</div>
  </div>
</header>

<div class="app">

  <!-- CHAT PANEL -->
  <div class="chat-panel">
    <div class="panel-title">AI Assistant</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Type your message..." rows="1" disabled></textarea>
      <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- QUIZ PANEL -->
  <div class="quiz-panel">

    <!-- IDLE -->
    <div class="quiz-idle" id="quizIdle">
      <div class="idle-icon">🧠</div>
      <div class="idle-title">Your Quiz Awaits</div>
      <div class="idle-sub">Chat with the AI on the left to get started. Tell it what topics excite you!</div>
      <div class="interest-tags" id="interestTags"></div>
    </div>

    <!-- LOADING -->
    <div class="quiz-loading hidden" id="quizLoading">
      <div class="loader-ring"></div>
      <div class="loader-text">GENERATING YOUR QUIZ...</div>
    </div>

    <!-- ACTIVE -->
    <div class="quiz-active hidden" id="quizActive">
      <div class="quiz-header">
        <div class="quiz-meta">
          <div class="quiz-topic" id="quizTopic"></div>
          <div class="quiz-progress-label" id="progressLabel">Question 1 / 5</div>
        </div>
        <div class="score-display">
          ⚡ <span class="score-num" id="scoreNum">0</span> pts
        </div>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="quiz-body">
        <div class="question-num" id="questionNum">Q 01</div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback-bar" id="feedbackBar"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
          Next →
        </button>
      </div>
    </div>

    <!-- RESULTS -->
    <div class="quiz-results hidden" id="quizResults">
      <div class="result-score-circle" id="resultCircle">
        <div class="result-score-inner">
          <div class="result-score-num" id="resultScore"></div>
          <div class="result-score-total" id="resultTotal"></div>
        </div>
      </div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-subtitle" id="resultSub"></div>
      <div class="result-actions">
        <button class="btn-primary" onclick="retryQuiz()">Retry Same Topics</button>
        <button class="btn-ghost" onclick="changeInterests()">Change Interests</button>
      </div>
    </div>

  </div>
</div>

<script>
// === STATE ===
let conversationHistory = [];
let currentInterests = [];
let quizQuestions = [];
let currentQ = 0;
let score = 0;
let answered = false;

const LETTERS = ['A','B','C','D'];

// === SYSTEM PROMPT ===
const SYSTEM_PROMPT = `You are QuizMind, a friendly and enthusiastic AI quiz companion. 

Your job:
1. Greet the user warmly when they first arrive
2. Ask them what topics they're interested in for a quiz (tech, science, history, sports, movies, music, geography, math, etc.)
3. Once you've identified their interests (1-3 topics), respond with this EXACT format at the end of your message:

INTERESTS_DETECTED: topic1, topic2, topic3

Keep responses short (2-4 sentences max), energetic, and encouraging. Be conversational, not robotic.
If the user says something unclear, gently guide them back to picking quiz topics.
Once interests are detected, tell them their quiz is being generated!`;

// === QUIZ GENERATION SYSTEM PROMPT ===
function getQuizPrompt(interests) {
  return `You are a quiz generator. Generate exactly 5 multiple-choice questions about: ${interests.join(', ')}.

Return ONLY valid JSON, no markdown, no explanation. Format:
{
  "questions": [
    {
      "question": "Question text here?",
      "options": ["Option A", "Option B", "Option C", "Option D"],
      "correct": 0,
      "explanation": "Brief explanation of why this is correct."
    }
  ]
}

Rules:
- "correct" is the 0-based index of the correct option
- Mix topics if multiple interests given
- Questions should be interesting, not trivial
- Options should be plausible, not obviously wrong
- Keep questions clear and concise`;
}

// === API CALL ===
async function callClaude(messages, systemPrompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

// === CHAT UI ===
function addMessage(role, text) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'bot' ? 'QuizMind AI' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // Strip the INTERESTS_DETECTED line from display
  const displayText = text.replace(/INTERESTS_DETECTED:.*$/m, '').trim();
  bubble.textContent = displayText;

  msg.appendChild(label);
  msg.appendChild(bubble);
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const indicator = document.createElement('div');
  indicator.className = 'message bot';
  indicator.id = 'typingIndicator';
  indicator.innerHTML = `
    <div class="msg-label">QuizMind AI</div>
    <div class="msg-bubble typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  container.appendChild(indicator);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator')?.remove();
}

function setInputEnabled(enabled) {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  input.disabled = !enabled;
  btn.disabled = !enabled;
  if (enabled) input.focus();
}

// === SEND MESSAGE ===
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  setInputEnabled(false);
  addMessage('user', text);

  conversationHistory.push({ role: 'user', content: text });

  showTyping();
  try {
    const reply = await callClaude(conversationHistory, SYSTEM_PROMPT);
    hideTyping();
    addMessage('bot', reply);
    conversationHistory.push({ role: 'assistant', content: reply });

    // Check for interests detection
    const match = reply.match(/INTERESTS_DETECTED:\s*(.+)/i);
    if (match) {
      const interests = match[1].split(',').map(s => s.trim()).filter(Boolean);
      if (interests.length > 0) {
        setInputEnabled(false);
        currentInterests = interests;
        showInterestTags(interests);
        setTimeout(() => generateQuiz(interests), 1200);
        return;
      }
    }
  } catch (e) {
    hideTyping();
    addMessage('bot', "Sorry, I had a connection issue. Please try again!");
  }

  setInputEnabled(true);
}

// === INTEREST TAGS ===
const tagClasses = {
  tech: 'tag-tech', technology: 'tag-tech', programming: 'tag-tech',
  science: 'tag-science', physics: 'tag-science', chemistry: 'tag-science',
  history: 'tag-history',
  sports: 'tag-sports', football: 'tag-sports', basketball: 'tag-sports',
  movies: 'tag-movies', cinema: 'tag-movies', film: 'tag-movies',
  music: 'tag-music',
};

function showInterestTags(interests) {
  const container = document.getElementById('interestTags');
  container.innerHTML = '';
  interests.forEach((interest, i) => {
    const tag = document.createElement('div');
    const cls = tagClasses[interest.toLowerCase()] || 'tag-default';
    tag.className = `tag ${cls}`;
    tag.textContent = `#${interest}`;
    tag.style.animationDelay = `${i * 0.1}s`;
    container.appendChild(tag);
  });
}

// === QUIZ GENERATION ===
async function generateQuiz(interests) {
  document.getElementById('quizIdle').classList.add('hidden');
  document.getElementById('quizLoading').classList.remove('hidden');

  try {
    const raw = await callClaude([
      { role: 'user', content: `Generate a quiz about: ${interests.join(', ')}` }
    ], getQuizPrompt(interests));

    const cleaned = raw.replace(/```json|```/g, '').trim();
    const data = JSON.parse(cleaned);
    quizQuestions = data.questions;
    currentQ = 0;
    score = 0;

    document.getElementById('quizLoading').classList.add('hidden');
    document.getElementById('quizActive').classList.remove('hidden');
    document.getElementById('quizTopic').textContent = interests.map(i => `#${i}`).join(' · ').toUpperCase();
    document.getElementById('scoreNum').textContent = '0';
    renderQuestion();
  } catch (e) {
    document.getElementById('quizLoading').classList.add('hidden');
    document.getElementById('quizIdle').classList.remove('hidden');
    addMessage('bot', "Hmm, I had trouble generating the quiz. Could you try picking your topics again?");
    setInputEnabled(true);
  }
}

// === RENDER QUESTION ===
function renderQuestion() {
  const q = quizQuestions[currentQ];
  const total = quizQuestions.length;
  answered = false;

  document.getElementById('progressLabel').textContent = `Question ${currentQ + 1} / ${total}`;
  document.getElementById('questionNum').textContent = `Q ${String(currentQ + 1).padStart(2, '0')}`;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('progressFill').style.width = `${(currentQ / total) * 100}%`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-letter', LETTERS[i]);
    btn.setAttribute('data-index', i);
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(i);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';
  fb.style.display = 'none';
  fb.textContent = '';

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = 'none';
}

// === HANDLE ANSWER ===
function handleAnswer(selected) {
  if (answered) return;
  answered = true;

  const q = quizQuestions[currentQ];
  const correct = q.correct;
  const buttons = document.querySelectorAll('.option-btn');
  const fb = document.getElementById('feedbackBar');
  const nextBtn = document.getElementById('nextBtn');

  buttons.forEach(btn => {
    btn.disabled = true;
    const idx = parseInt(btn.getAttribute('data-index'));
    if (idx === correct) btn.classList.add('correct');
    else if (idx === selected && selected !== correct) btn.classList.add('wrong');
  });

  if (selected === correct) {
    score++;
    document.getElementById('scoreNum').textContent = score;
    fb.className = 'feedback-bar correct-fb';
    fb.innerHTML = `✅ Correct! ${q.explanation}`;
  } else {
    fb.className = 'feedback-bar wrong-fb';
    fb.innerHTML = `❌ Not quite. ${q.explanation}`;
  }

  nextBtn.style.display = 'flex';

  const isLast = currentQ === quizQuestions.length - 1;
  nextBtn.textContent = isLast ? 'See Results →' : 'Next →';
}

// === NEXT QUESTION ===
function nextQuestion() {
  currentQ++;
  if (currentQ >= quizQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// === SHOW RESULTS ===
function showResults() {
  document.getElementById('quizActive').classList.add('hidden');
  document.getElementById('quizResults').classList.remove('hidden');

  const total = quizQuestions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = `/ ${total}`;
  document.getElementById('resultCircle').style.setProperty('--pct', `${pct}%`);

  let title, sub;
  if (pct === 100) { title = '🏆 Perfect Score!'; sub = "You're a genius. Truly unstoppable."; }
  else if (pct >= 80) { title = '🔥 Excellent!'; sub = "You really know your stuff. Impressive performance!"; }
  else if (pct >= 60) { title = '👍 Good Job!'; sub = "Solid effort! A bit more practice and you'll nail it."; }
  else if (pct >= 40) { title = '📚 Keep Going!'; sub = "Not bad for a start. Retry to improve your score!"; }
  else { title = '💪 Try Again!'; sub = "Everyone starts somewhere. Give it another shot!"; }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;

  // Bot comment
  const comment = pct >= 60
    ? `You scored ${score}/${total} — that's ${pct}%! 🎉 Great work on the ${currentInterests.join(' & ')} quiz!`
    : `You got ${score}/${total} this time. Want to retry or explore a different topic? 😊`;
  addMessage('bot', comment);
}

// === RETRY / CHANGE ===
function retryQuiz() {
  document.getElementById('quizResults').classList.add('hidden');
  generateQuiz(currentInterests);
}

function changeInterests() {
  document.getElementById('quizResults').classList.add('hidden');
  document.getElementById('quizIdle').classList.remove('hidden');
  document.getElementById('interestTags').innerHTML = '';
  conversationHistory = [];
  addMessage('bot', "Sure! Tell me what new topics you'd like to explore 🎯");
  setInputEnabled(true);
}

// === AUTO-RESIZE TEXTAREA ===
document.getElementById('chatInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

document.getElementById('chatInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!this.disabled) sendMessage();
  }
});

// === INIT ===
async function init() {
  showTyping();
  try {
    const greeting = await callClaude(
      [{ role: 'user', content: 'Hello! I just opened the quiz app.' }],
      SYSTEM_PROMPT
    );
    hideTyping();
    addMessage('bot', greeting);
    conversationHistory.push({ role: 'assistant', content: greeting });
    setInputEnabled(true);
  } catch (e) {
    hideTyping();
    addMessage('bot', "Hi! Welcome to QuizMind AI! 🎉 What topics would you like to be quizzed on today?");
    setInputEnabled(true);
  }
}

init();
</script>
